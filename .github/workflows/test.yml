name: Unit Tests

# ─────────────────────────────────────────────────────────────
# 可复用单元测试工作流（被 ci.yml / release.yml 调用）
# 对应发布流程：所有阶段的基础质量门禁
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feature/**'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/*.md'
      - 'log/**'
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      fail-on-coverage:
        description: '是否强制覆盖率检查（发布流程启用，CI 不启用）'
        required: false
        type: boolean
        default: false
  workflow_dispatch:

# 并发控制：同分支新推送取消旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # bot 提交跳过，避免循环触发
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Run unit tests
        run: |
          set -o pipefail
          gradle :app:testDebugUnitTest --console=plain --stacktrace 2>&1 | tee test-output.log

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests
            app/build/test-results
            test-output.log

      - name: Publish test summary
        if: always()
        run: |
          echo "## Unit Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if compgen -G "app/build/test-results/testDebugUnitTest/TEST-*.xml" > /dev/null; then
            echo "| Module | Tests | Failures | Skipped |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
            for f in app/build/test-results/testDebugUnitTest/TEST-*.xml; do
              module=$(basename "$f" | sed 's/^TEST-//' | sed 's/\.xml$//')
              tests=$(grep -oP 'tests="\K[^"]+' "$f" | head -1)
              failures=$(grep -oP 'failures="\K[^"]+' "$f" | head -1)
              skipped=$(grep -oP 'skipped="\K[^"]+' "$f" | head -1)
              echo "| $module | $tests | $failures | $skipped |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "Test result files not generated, check build logs above." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Coverage enforcement: ${{ inputs.fail-on-coverage }}" >> "$GITHUB_STEP_SUMMARY"
