name: Unit Tests

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feature/**'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/*.md'
      - 'log/**'
  pull_request:
    branches:
      - main
  # 供 ci.yml / release.yml 复用本工作流（先测试后打包）
  workflow_call:
    inputs:
      fail-on-coverage:
        description: '是否强制覆盖率检查（发布流程启用，CI 不启用）'
        required: false
        type: boolean
        default: false
  workflow_dispatch:

# 并发控制：同一分支的新推送自动取消旧运行，避免资源浪费
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # bot 提交（如版本号 bump）跳过测试，避免循环触发
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.name != 'github-actions[bot]' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 启用 Gradle 依赖缓存，避免每次构建重复下载
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Run unit tests
        run: |
          set -o pipefail
          gradle :app:testDebugUnitTest --console=plain --stacktrace 2>&1 | tee test-output.log

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests
            app/build/test-results
            test-output.log

      - name: Publish test summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # 使用 compgen -G 检查 glob 匹配（比 [ -f ] 更可靠）
          if compgen -G "app/build/test-results/testDebugUnitTest/TEST-*.xml" > /dev/null; then
            echo "| Module | Tests | Failures | Skipped |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|----------|---------|" >> $GITHUB_STEP_SUMMARY
            for f in app/build/test-results/testDebugUnitTest/TEST-*.xml; do
              module=$(basename "$f" | sed 's/^TEST-//' | sed 's/\.xml$//')
              tests=$(grep -oP 'tests="\K[^"]+' "$f" | head -1)
              failures=$(grep -oP 'failures="\K[^"]+' "$f" | head -1)
              skipped=$(grep -oP 'skipped="\K[^"]+' "$f" | head -1)
              echo "| $module | $tests | $failures | $skipped |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "测试结果文件未生成，请查看上方构建日志。" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "覆盖率强制检查: ${{ inputs.fail-on-coverage }}" >> $GITHUB_STEP_SUMMARY
