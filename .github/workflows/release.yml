name: Release Build APK

# ─────────────────────────────────────────────────────────────
# 发布工作流（对应发布流程第 3-5 步）
#   3. 修复完成后，发布 beta 版到 GitHub（tag: v1.2.0-beta.1）
#   4. 根据用户反馈继续修复，再次发布 beta 版（tag: v1.2.0-beta.2）
#   5. 最后稳定后，发布正式版（tag: v1.2.0）
#
# Tag 规范：
#   - Beta 预发布：v1.2.0-beta.1, v1.2.0-beta.2 ...
#   - RC 候选版：  v1.2.0-rc.1 ...
#   - 正式发布：   v1.2.0
# 工作流会自动从 tag 检测是否为 Pre-release（包含 -beta/-rc/-alpha）。
# 敏感信息已通过 secrets.dat 加密入库；签名密钥使用 GitHub Secrets。
# ─────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag（例如 v1.2.0 或 v1.2.0-beta.1）'
        required: true
        type: string
      version_name:
        description: '版本名称（例如 1.2.0），留空则自动从 tag 推断'
        required: false
        type: string
      version_code:
        description: '版本代号（整数），留空则自动在现有基础上 +1'
        required: false
        type: string
      commit_version:
        description: '是否将版本更新提交回仓库'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否为预发布（留空则根据 tag 自动判断）'
        required: false
        type: boolean
        default: false

# 并发控制：发布流程不取消进行中的运行，避免中断发布
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 先测试：复用 test.yml，发布流程强制覆盖率检查
  test:
    name: Run Unit Tests
    uses: ./.github/workflows/test.yml
    with:
      fail-on-coverage: true

  build:
    name: Build Release APK
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，便于生成变更日志

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      # 解析发布参数：tag 触发时从 $GITHUB_REF 推断，手动触发从 inputs 读取
      # 自动检测 prerelease：tag 包含 -beta/-rc/-alpha 视为预发布
      - name: Resolve release parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "trigger=tag" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.tag }}"
            echo "trigger=manual" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

          # 自动检测 prerelease：tag 包含 -beta/-rc/-alpha 视为预发布
          if echo "$TAG" | grep -qE '-(beta|rc|alpha)\.'; then
            IS_PRERELEASE=true
            echo "Detected pre-release tag: $TAG"
          else
            IS_PRERELEASE=false
            echo "Detected stable tag: $TAG"
          fi

          # 手动触发时，若用户显式指定 prerelease，则优先使用用户指定值
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
              IS_PRERELEASE=true
              echo "Manual override: pre-release enabled by user"
            elif [ "${{ github.event.inputs.prerelease }}" = "false" ]; then
              IS_PRERELEASE=false
              echo "Manual override: stable release enabled by user"
            fi
          fi

          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Final prerelease flag: $IS_PRERELEASE"

      - name: Update version
        id: version
        run: |
          TAG="${{ steps.params.outputs.tag }}"
          VERSION_NAME="${{ github.event.inputs.version_name || '' }}"
          VERSION_CODE="${{ github.event.inputs.version_code || '' }}"

          # 从 tag 推断 version_name（去除前缀 v 和预发布后缀）
          if [ -z "$VERSION_NAME" ]; then
            # v1.2.0-beta.1 → 1.2.0-beta.1
            VERSION_NAME="${TAG#v}"
          fi

          # 推断 version_code：当前值 +1
          if [ -z "$VERSION_CODE" ]; then
            CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
            VERSION_CODE=$((CURRENT_CODE + 1))
          fi

          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

          echo "Updated versionCode=$VERSION_CODE, versionName=$VERSION_NAME"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      # 解码签名密钥（使用 25 年长效证书，确保跨版本签名一致）
      - name: Decode keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          mkdir -p signing
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 -d > signing/release.keystore
          if [ ! -s signing/release.keystore ]; then
            echo "Error: decoded keystore is empty. Check KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "Decoded keystore size: $(stat -c%s signing/release.keystore) bytes"
          keytool -list -v -keystore signing/release.keystore -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" || {
            echo "Error: keystore verification failed. Check KEYSTORE_BASE64, KEY_ALIAS and KEYSTORE_PASSWORD."
            exit 1
          }

      # 敏感信息已通过 secrets.dat 加密入库，Release 构建无需额外 GitHub Secrets。
      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/signing/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle assembleRelease --no-daemon --stacktrace

      # 签名验证：使用 apksigner 验证 v1+v2+v3 签名方案，输出指纹供一致性检查
      - name: Verify APK signature and output fingerprint
        id: signature
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: Release APK not found at $APK_PATH"
            exit 1
          fi

          # 定位 apksigner（GitHub Actions 预装 build-tools）
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "Error: apksigner not found in $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using apksigner: $APKSIGNER"

          # 1. 验证 APK 签名有效性（v1+v2+v3 方案）
          echo "=== Verify APK signature ==="
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH"

          # 2. 提取签名指纹用于一致性对比
          echo ""
          echo "=== Signature fingerprint ==="
          FINGERPRINT_SHA1=$(keytool -printcert -jarfile "$APK_PATH" | grep "SHA1:" | head -1 | awk '{print $2}')
          FINGERPRINT_SHA256=$(keytool -printcert -jarfile "$APK_PATH" | grep "SHA256:" | head -1 | awk '{print $2}')
          echo "SHA-1:   $FINGERPRINT_SHA1"
          echo "SHA-256: $FINGERPRINT_SHA256"

          # 3. 将指纹写入文件，作为 artifact 上传供后续对比
          mkdir -p signing-report
          cat > signing-report/signature-fingerprint.txt <<EOF
          RadioAreaLocator Release APK Signature Fingerprint
          ===================================================
          Build Tag:     ${{ steps.params.outputs.tag }}
          Build Date:    $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Commit:        ${{ github.sha }}
          Pre-release:   ${{ steps.params.outputs.is_prerelease }}

          SHA-1:         $FINGERPRINT_SHA1
          SHA-256:       $FINGERPRINT_SHA256

          Notes:
          - Each Release build should have the same signature fingerprint.
          - If the fingerprint changes, the keystore was replaced and users
            must uninstall the old version before installing the new one.
          EOF
          echo "fingerprint_sha1=$FINGERPRINT_SHA1" >> "$GITHUB_OUTPUT"
          echo "fingerprint_sha256=$FINGERPRINT_SHA256" >> "$GITHUB_OUTPUT"

      # 签名一致性检查：输出到 Step Summary，便于跨版本对比
      - name: Check signature consistency
        env:
          CURRENT_SHA256: ${{ steps.signature.outputs.fingerprint_sha256 }}
        run: |
          echo "=== Signature consistency check ==="
          echo "Current build SHA-256: $CURRENT_SHA256"
          echo "## Signature Info" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA-1 | \`${{ steps.signature.outputs.fingerprint_sha1 }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA-256 | \`${{ steps.signature.outputs.fingerprint_sha256 }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${{ steps.params.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | ${{ steps.params.outputs.is_prerelease }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If this fingerprint differs from the previous Release, users must uninstall the old version first." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            app/build/outputs

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk RadioAreaLocator-${{ steps.params.outputs.tag }}.apk

      - name: Upload signature report
        uses: actions/upload-artifact@v4
        with:
          name: signature-report-${{ steps.params.outputs.tag }}
          path: signing-report/signature-fingerprint.txt

      # 手动触发时将版本号 bump 提交回仓库（标签触发时跳过）
      - name: Commit version bump
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.commit_version == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})"
          git push origin HEAD:main

      # 创建 GitHub Release，包含 APK、签名指纹、自动变更日志
      # prerelease 标志：由上方步骤自动检测（tag 后缀）或用户手动指定
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.params.outputs.tag }}
          files: |
            RadioAreaLocator-${{ steps.params.outputs.tag }}.apk
            signing-report/signature-fingerprint.txt
          body: |
            ## Version ${{ steps.params.outputs.tag }}

            ### Version Info
            - Version: ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})
            - Commit: ${{ github.sha }}
            - Pre-release: ${{ steps.params.outputs.is_prerelease }}

            ### Signature Info
            - SHA-1: `${{ steps.signature.outputs.fingerprint_sha1 }}`
            - SHA-256: `${{ steps.signature.outputs.fingerprint_sha256 }}`

            ### Installation
            > If this fingerprint differs from the installed version, uninstall the old one first.
            > Matching fingerprints allow direct overwrite installation.

            ### Changelog
            See auto-generated Release Notes below.
          generate_release_notes: true
          # 使用自动检测的 prerelease 标志（tag 后缀自动判断 + 手动覆盖）
          prerelease: ${{ steps.params.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 发布状态报告：汇总构建结果到 Step Summary
      - name: Publish release status report
        if: always()
        run: |
          echo "## Release Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${{ steps.params.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | ${{ steps.params.outputs.is_prerelease }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Release completed successfully" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Release failed, check logs above" >> "$GITHUB_STEP_SUMMARY"
          fi

  # 状态通知：汇总测试与构建结果
  notify:
    name: Status Notification
    needs: [test, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - name: Workflow status notification
        run: |
          echo "## Workflow Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit Tests | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # skipped 视为正常（如 bot 提交时 job 被跳过）
          TEST_OK=false
          BUILD_OK=false
          [ "${{ needs.test.result }}" = "success" ] || [ "${{ needs.test.result }}" = "skipped" ] && TEST_OK=true
          [ "${{ needs.build.result }}" = "success" ] || [ "${{ needs.build.result }}" = "skipped" ] && BUILD_OK=true

          if [ "$TEST_OK" = "true" ] && [ "$BUILD_OK" = "true" ]; then
            echo "✅ Overall: success"
            echo "GitHub will automatically send success notification emails to watchers and contributors."
          else
            echo "❌ Overall: failure"
            echo "GitHub will automatically send failure notification emails to committers and watchers."
            exit 1
          fi
